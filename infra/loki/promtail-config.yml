# =============================================================================
# Promtail 설정
# - Docker service discovery 로 호스트의 모든 컨테이너 로그 수집
# - container_name / image 라벨 자동 추출
# - batch_wait 1s 로 저지연 푸시
# =============================================================================

server:
  http_listen_port: 9080
  grpc_listen_port: 0
  log_level: info

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push
    # 저지연을 위해 1 초마다 flush
    batchwait: 1s
    batchsize: 1048576

scrape_configs:
  # ---------------------------------------------------------------------------
  # Docker service discovery — 호스트 데몬의 모든 컨테이너
  # ---------------------------------------------------------------------------
  - job_name: docker
    docker_sd_configs:
      - host: unix:///var/run/docker.sock
        refresh_interval: 10s
    relabel_configs:
      # 컨테이너 이름 (선행 슬래시 제거)
      - source_labels: ['__meta_docker_container_name']
        regex: '/(.*)'
        target_label: 'container_name'
      # 이미지 이름
      - source_labels: ['__meta_docker_container_log_stream']
        target_label: 'log_stream'
      - source_labels: ['__meta_docker_container_image']
        target_label: 'image'
      # 기본 job 라벨
      - target_label: 'job'
        replacement: 'docker'
