# =============================================================================
# openplatform_v3 관측성 스택 (Loki + Promtail + Grafana + Prometheus)
# -----------------------------------------------------------------------------
# 기본 compose 와 함께 다음과 같이 기동:
#   docker compose -f infra/docker-compose.yml \
#                  -f infra/docker-compose.observability.yml up -d
# 모든 서비스는 기존 v3-net 네트워크에 join 하여 backend-core / backend-bff /
# traefik 와 통신한다.
# =============================================================================

services:

  # ---------------------------------------------------------------------------
  # Loki — 로그 집계 (단일 인스턴스, filesystem 저장소, 1주 보존)
  # ---------------------------------------------------------------------------
  loki:
    image: grafana/loki:3.0.0
    container_name: v3-loki
    restart: unless-stopped
    # 호스트 포트는 port-conflicts 방지를 위해 19310 으로 고정
    ports:
      - "19310:3100"
    command: -config.file=/etc/loki/loki-config.yml
    volumes:
      - ./loki/loki-config.yml:/etc/loki/loki-config.yml:ro
      - loki-data:/loki
    networks:
      - v3-net

  # ---------------------------------------------------------------------------
  # Promtail — Docker 컨테이너 로그 수집 → Loki push
  # ---------------------------------------------------------------------------
  promtail:
    image: grafana/promtail:3.0.0
    container_name: v3-promtail
    restart: unless-stopped
    command: -config.file=/etc/promtail/promtail-config.yml
    volumes:
      - ./loki/promtail-config.yml:/etc/promtail/promtail-config.yml:ro
      # Docker SD 용 소켓 (읽기 전용)
      - /var/run/docker.sock:/var/run/docker.sock:ro
      # 컨테이너 로그 파일 원본 (읽기 전용)
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
    depends_on:
      - loki
    networks:
      - v3-net

  # ---------------------------------------------------------------------------
  # Prometheus — 메트릭 스크레이프 (backend-core / backend-bff / traefik)
  # ---------------------------------------------------------------------------
  prometheus:
    image: prom/prometheus:v2.54.0
    container_name: v3-prometheus
    restart: unless-stopped
    ports:
      - "19309:9090"
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --storage.tsdb.retention.time=15d
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    networks:
      - v3-net

  # ---------------------------------------------------------------------------
  # Grafana — 대시보드 (Loki / Prometheus 데이터소스 자동 프로비저닝)
  # ---------------------------------------------------------------------------
  grafana:
    image: grafana/grafana:11.1.0
    container_name: v3-grafana
    restart: unless-stopped
    ports:
      - "19300:3000"
    environment:
      # 초기 관리자 계정 (운영 전환 시 변경 권장)
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - grafana-data:/var/lib/grafana
    depends_on:
      - loki
      - prometheus
    networks:
      - v3-net

# =============================================================================
# 볼륨 — 각 서비스 영속 데이터
# =============================================================================
volumes:
  loki-data:
  prometheus-data:
  grafana-data:

# =============================================================================
# 네트워크 — 기본 compose 에서 선언된 v3-net 을 external 로 참조
# =============================================================================
networks:
  v3-net:
    external: true
    name: openplatform-v3-net
