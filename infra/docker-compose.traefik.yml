# ==============================================================================
# Traefik 리버스 프록시 연동 오버라이드
# ------------------------------------------------------------------------------
# 사용법:
#   docker compose -f infra/docker-compose.yml \
#                  -f infra/docker-compose.traefik.yml up -d
#
# 전제 조건:
#   1. 루트 워크스페이스의 traefik 서비스가 먼저 기동되어 있어야 함
#   2. 외부 네트워크 `traefik-net` 이 이미 생성되어 있어야 함
#      (docker network create traefik-net)
#   3. 로컬 hosts 파일 또는 dnsmasq 로 *.v3.localhost 가 127.0.0.1 로 해석되어야 함
#
# 도메인 규칙:
#   - portal.v3.localhost     → ui-frontend
#   - api.v3.localhost        → backend-core
#   - bff.v3.localhost        → backend-bff
#   - keycloak.v3.localhost   → keycloak
#   - minio.v3.localhost      → minio (S3 API)
#   - s3.v3.localhost         → minio console
#   - chat.v3.localhost       → rocketchat
#   - wiki.v3.localhost       → wikijs
#   - mail.v3.localhost       → stalwart (webmail/JMAP)
#
# Traefik entrypoints:
#   - web       : :80   (HTTP, 자동 HTTPS redirect)
#   - websecure : :443  (HTTPS, 로컬 개발은 self-signed 또는 mkcert)
# ==============================================================================

networks:
  # 루트 워크스페이스의 traefik 스택에서 생성된 외부 네트워크
  traefik-net:
    external: true
  # 기존 openplatform_v3 내부 네트워크 (그대로 유지)
  default:
    driver: bridge

# ------------------------------------------------------------------------------
# 공통 미들웨어 정의는 labels 로 선언 (Traefik 파일 프로바이더 대신 docker provider 사용)
# - op3-gzip          : gzip 압축
# - op3-sec-headers   : 기본 보안 헤더 (HSTS, XFO, CSP 기본값)
# ------------------------------------------------------------------------------

services:

  # ============================================================================
  # UI Frontend (포털 SPA)
  # ============================================================================
  ui-frontend:
    networks:
      - default
      - traefik-net
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=traefik-net"
      # HTTP 라우터 (자동 HTTPS 리다이렉트)
      - "traefik.http.routers.op3-portal.rule=Host(`portal.v3.localhost`)"
      - "traefik.http.routers.op3-portal.entrypoints=web,websecure"
      - "traefik.http.routers.op3-portal.tls=true"
      - "traefik.http.services.op3-portal.loadbalancer.server.port=80"
      # 미들웨어 체인: gzip + 보안 헤더
      - "traefik.http.routers.op3-portal.middlewares=op3-gzip@docker,op3-sec-headers@docker"
      # 공통 미들웨어 선언 (한 서비스에서만 선언해도 전역 사용 가능)
      - "traefik.http.middlewares.op3-gzip.compress=true"
      - "traefik.http.middlewares.op3-sec-headers.headers.stsSeconds=31536000"
      - "traefik.http.middlewares.op3-sec-headers.headers.stsIncludeSubdomains=true"
      - "traefik.http.middlewares.op3-sec-headers.headers.frameDeny=false"
      - "traefik.http.middlewares.op3-sec-headers.headers.contentTypeNosniff=true"
      - "traefik.http.middlewares.op3-sec-headers.headers.browserXssFilter=true"
      - "traefik.http.middlewares.op3-sec-headers.headers.referrerPolicy=strict-origin-when-cross-origin"

  # ============================================================================
  # Backend Core (Spring Boot REST API)
  # ============================================================================
  backend-core:
    networks:
      - default
      - traefik-net
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=traefik-net"
      - "traefik.http.routers.op3-api.rule=Host(`api.v3.localhost`)"
      - "traefik.http.routers.op3-api.entrypoints=web,websecure"
      - "traefik.http.routers.op3-api.tls=true"
      - "traefik.http.services.op3-api.loadbalancer.server.port=8080"
      - "traefik.http.routers.op3-api.middlewares=op3-gzip@docker,op3-sec-headers@docker"

  # ============================================================================
  # Backend BFF (Backend-For-Frontend, 포털 전용 게이트웨이)
  # ============================================================================
  backend-bff:
    networks:
      - default
      - traefik-net
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=traefik-net"
      - "traefik.http.routers.op3-bff.rule=Host(`bff.v3.localhost`)"
      - "traefik.http.routers.op3-bff.entrypoints=web,websecure"
      - "traefik.http.routers.op3-bff.tls=true"
      - "traefik.http.services.op3-bff.loadbalancer.server.port=8081"
      - "traefik.http.routers.op3-bff.middlewares=op3-gzip@docker,op3-sec-headers@docker"

  # ============================================================================
  # Keycloak (OIDC/SAML IdP)
  # - Keycloak 은 자체 캐시/세션이 있으므로 sticky session 은 단일 인스턴스에선 불필요
  # ============================================================================
  keycloak:
    networks:
      - default
      - traefik-net
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=traefik-net"
      - "traefik.http.routers.op3-keycloak.rule=Host(`keycloak.v3.localhost`)"
      - "traefik.http.routers.op3-keycloak.entrypoints=web,websecure"
      - "traefik.http.routers.op3-keycloak.tls=true"
      - "traefik.http.services.op3-keycloak.loadbalancer.server.port=8080"
      - "traefik.http.routers.op3-keycloak.middlewares=op3-gzip@docker,op3-sec-headers@docker"

  # ============================================================================
  # MinIO (S3 호환 오브젝트 스토리지)
  # - S3 API 와 Console 은 서로 다른 포트 (9000 / 9001) 를 사용하므로 라우터 2개 선언
  # ============================================================================
  minio:
    networks:
      - default
      - traefik-net
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=traefik-net"
      # S3 API (포트 9000)
      - "traefik.http.routers.op3-minio-s3.rule=Host(`minio.v3.localhost`)"
      - "traefik.http.routers.op3-minio-s3.entrypoints=web,websecure"
      - "traefik.http.routers.op3-minio-s3.tls=true"
      - "traefik.http.routers.op3-minio-s3.service=op3-minio-s3"
      - "traefik.http.services.op3-minio-s3.loadbalancer.server.port=9000"
      # Console UI (포트 9001)
      - "traefik.http.routers.op3-minio-console.rule=Host(`s3.v3.localhost`)"
      - "traefik.http.routers.op3-minio-console.entrypoints=web,websecure"
      - "traefik.http.routers.op3-minio-console.tls=true"
      - "traefik.http.routers.op3-minio-console.service=op3-minio-console"
      - "traefik.http.services.op3-minio-console.loadbalancer.server.port=9001"
      # 양쪽 라우터 모두 공통 미들웨어 적용
      - "traefik.http.routers.op3-minio-s3.middlewares=op3-gzip@docker,op3-sec-headers@docker"
      - "traefik.http.routers.op3-minio-console.middlewares=op3-gzip@docker,op3-sec-headers@docker"

  # ============================================================================
  # Rocket.Chat (메신저)
  # - WebSocket 지원이 필요하므로 별도 설정 없이 Traefik 기본값 사용 (자동 처리)
  # ============================================================================
  rocketchat:
    networks:
      - default
      - traefik-net
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=traefik-net"
      - "traefik.http.routers.op3-chat.rule=Host(`chat.v3.localhost`)"
      - "traefik.http.routers.op3-chat.entrypoints=web,websecure"
      - "traefik.http.routers.op3-chat.tls=true"
      - "traefik.http.services.op3-chat.loadbalancer.server.port=3000"
      - "traefik.http.routers.op3-chat.middlewares=op3-gzip@docker,op3-sec-headers@docker"

  # ============================================================================
  # Wiki.js (위키 / 지식베이스)
  # ============================================================================
  wikijs:
    networks:
      - default
      - traefik-net
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=traefik-net"
      - "traefik.http.routers.op3-wiki.rule=Host(`wiki.v3.localhost`)"
      - "traefik.http.routers.op3-wiki.entrypoints=web,websecure"
      - "traefik.http.routers.op3-wiki.tls=true"
      - "traefik.http.services.op3-wiki.loadbalancer.server.port=3000"
      - "traefik.http.routers.op3-wiki.middlewares=op3-gzip@docker,op3-sec-headers@docker"

  # ============================================================================
  # Stalwart (메일 서버, JMAP/IMAP/SMTP)
  # - SMTP/IMAP 은 TCP 라우터 필요 (별도 entrypoint) 이지만 여기서는 웹 UI 만 노출
  # ============================================================================
  stalwart:
    networks:
      - default
      - traefik-net
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=traefik-net"
      - "traefik.http.routers.op3-mail.rule=Host(`mail.v3.localhost`)"
      - "traefik.http.routers.op3-mail.entrypoints=web,websecure"
      - "traefik.http.routers.op3-mail.tls=true"
      - "traefik.http.services.op3-mail.loadbalancer.server.port=8080"
      - "traefik.http.routers.op3-mail.middlewares=op3-gzip@docker,op3-sec-headers@docker"
